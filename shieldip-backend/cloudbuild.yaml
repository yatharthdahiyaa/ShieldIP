steps:
  # ─────────────────────────────────────────────
  # Build Docker images for all 5 services
  # ─────────────────────────────────────────────

  # 1. api-gateway-service
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/shieldip/api-gateway-service:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/shieldip/api-gateway-service:latest'
      - './services/api-gateway'
    id: 'build-api-gateway'

  # 2. fingerprint-service
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/shieldip/fingerprint-service:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/shieldip/fingerprint-service:latest'
      - './services/fingerprint'
    id: 'build-fingerprint'

  # 3. monitor-service
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/shieldip/monitor-service:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/shieldip/monitor-service:latest'
      - './services/monitor'
    id: 'build-monitor'

  # 4. risk-scoring-service
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/shieldip/risk-scoring-service:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/shieldip/risk-scoring-service:latest'
      - './services/risk-scoring'
    id: 'build-risk-scoring'

  # 5. enforcement-service
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/shieldip/enforcement-service:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/shieldip/enforcement-service:latest'
      - './services/enforcement'
    id: 'build-enforcement'

  # ─────────────────────────────────────────────
  # Push all images to Artifact Registry
  # ─────────────────────────────────────────────

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/shieldip/api-gateway-service']
    id: 'push-api-gateway'
    waitFor: ['build-api-gateway']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/shieldip/fingerprint-service']
    id: 'push-fingerprint'
    waitFor: ['build-fingerprint']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/shieldip/monitor-service']
    id: 'push-monitor'
    waitFor: ['build-monitor']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/shieldip/risk-scoring-service']
    id: 'push-risk-scoring'
    waitFor: ['build-risk-scoring']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/shieldip/enforcement-service']
    id: 'push-enforcement'
    waitFor: ['build-enforcement']

  # ─────────────────────────────────────────────
  # Deploy all services to Cloud Run
  # ─────────────────────────────────────────────

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'api-gateway-service'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/shieldip/api-gateway-service:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--set-env-vars=GCP_PROJECT_ID=${PROJECT_ID},GCS_ASSETS_BUCKET=shieldip-assets-${PROJECT_ID},GCS_EVIDENCE_BUCKET=shieldip-evidence-${PROJECT_ID},FIRESTORE_DATABASE=(default),BIGQUERY_DATASET=shieldip_analytics,TASKS_QUEUE=enforcement-actions,GEMINI_API_KEY=${_GEMINI_API_KEY},GEMINI_MODEL=gemini-2.5-flash'
      - '--service-account=shieldip-api-gateway@${PROJECT_ID}.iam.gserviceaccount.com'
    id: 'deploy-api-gateway'
    waitFor: ['push-api-gateway']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'fingerprint-service'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/shieldip/fingerprint-service:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--no-allow-unauthenticated'
      - '--set-env-vars=GCP_PROJECT_ID=${PROJECT_ID},GCS_ASSETS_BUCKET=shieldip-assets-${PROJECT_ID},GCS_EVIDENCE_BUCKET=shieldip-evidence-${PROJECT_ID},FIRESTORE_DATABASE=(default),BIGQUERY_DATASET=shieldip_analytics,TASKS_QUEUE=enforcement-actions,GEMINI_API_KEY=${_GEMINI_API_KEY},GEMINI_MODEL=gemini-2.5-flash'
      - '--service-account=shieldip-fingerprint@${PROJECT_ID}.iam.gserviceaccount.com'
    id: 'deploy-fingerprint'
    waitFor: ['push-fingerprint']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'monitor-service'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/shieldip/monitor-service:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--no-allow-unauthenticated'
      - '--set-env-vars=GCP_PROJECT_ID=${PROJECT_ID},GCS_ASSETS_BUCKET=shieldip-assets-${PROJECT_ID},GCS_EVIDENCE_BUCKET=shieldip-evidence-${PROJECT_ID},FIRESTORE_DATABASE=(default),BIGQUERY_DATASET=shieldip_analytics,TASKS_QUEUE=enforcement-actions,GEMINI_API_KEY=${_GEMINI_API_KEY},GEMINI_MODEL=gemini-2.5-flash'
      - '--service-account=shieldip-monitor@${PROJECT_ID}.iam.gserviceaccount.com'
    id: 'deploy-monitor'
    waitFor: ['push-monitor']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'risk-scoring-service'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/shieldip/risk-scoring-service:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--no-allow-unauthenticated'
      - '--set-env-vars=GCP_PROJECT_ID=${PROJECT_ID},GCS_ASSETS_BUCKET=shieldip-assets-${PROJECT_ID},GCS_EVIDENCE_BUCKET=shieldip-evidence-${PROJECT_ID},FIRESTORE_DATABASE=(default),BIGQUERY_DATASET=shieldip_analytics,TASKS_QUEUE=enforcement-actions,GEMINI_API_KEY=${_GEMINI_API_KEY},GEMINI_MODEL=gemini-2.5-flash'
      - '--service-account=shieldip-risk-scoring@${PROJECT_ID}.iam.gserviceaccount.com'
    id: 'deploy-risk-scoring'
    waitFor: ['push-risk-scoring']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'enforcement-service'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/shieldip/enforcement-service:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--no-allow-unauthenticated'
      - '--set-env-vars=GCP_PROJECT_ID=${PROJECT_ID},GCS_ASSETS_BUCKET=shieldip-assets-${PROJECT_ID},GCS_EVIDENCE_BUCKET=shieldip-evidence-${PROJECT_ID},FIRESTORE_DATABASE=(default),BIGQUERY_DATASET=shieldip_analytics,TASKS_QUEUE=enforcement-actions,GEMINI_API_KEY=${_GEMINI_API_KEY},GEMINI_MODEL=gemini-2.5-flash'
      - '--service-account=shieldip-enforcement@${PROJECT_ID}.iam.gserviceaccount.com'
    id: 'deploy-enforcement'
    waitFor: ['push-enforcement']

  # ─────────────────────────────────────────────
  # Update API Gateway with enforcement service URL
  # ─────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        ENFORCEMENT_URL=$(gcloud run services describe enforcement-service \
          --region=${_REGION} --format='value(status.url)')
        gcloud run services update api-gateway-service \
          --region=${_REGION} \
          --update-env-vars=ENFORCEMENT_SERVICE_URL=$$ENFORCEMENT_URL
    id: 'update-gateway-env'
    waitFor: ['deploy-api-gateway', 'deploy-enforcement']

substitutions:
  _REGION: 'us-central1'
  _GEMINI_API_KEY: ''

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/shieldip/api-gateway-service'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/shieldip/fingerprint-service'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/shieldip/monitor-service'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/shieldip/risk-scoring-service'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/shieldip/enforcement-service'
